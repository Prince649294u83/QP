version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: dsatm_postgres
    environment:
      POSTGRES_USER: dsatm_user
      POSTGRES_PASSWORD: dsatm_password
      POSTGRES_DB: dsatm_qpgen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dsatm_user -d dsatm_qpgen"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: dsatm_mongodb
    environment:
      MONGO_INITDB_DATABASE: dsatm_docs
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mongodb_data:
